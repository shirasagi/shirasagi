name: "shirasagi-devcontainer"

services:
  shirasagi:
    env_file:
      - path: ../.env
        required: false
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/shirasagi:cached
    command: sleep infinity
    ports:
      - ${PORT:-3000}:${PORT:-3000}
    depends_on:
      - db
      - mail
      - elasticsearch
    links:
      - db:database
      - mail:mail
      - elasticsearch:elasticsearch

  db:
    image: mongo:7.0
    env_file:
      - path: ../.env
        required: false
    volumes:
      - db_data:/data/db

  mail:
    image: ghcr.io/shirasagi/mail:latest
    ports:
      - "10143:143"
      - "10587:587"

  elasticsearch:
    image: ghcr.io/shirasagi/elasticsearch:8
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  db_data: {}
  es_data: {}
